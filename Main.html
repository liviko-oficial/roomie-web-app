<form id="imageForm" enctype="multipart/form-data">
  <div>
    <label>Imagen Principal (Obligatoria):</label>
    <input type="file" name="mainImage" accept="image/*" required>
  </div>
  
  <div>
    <label>Imágenes Opcionales (máximo 6):</label>
    <input type="file" name="optionalImages" accept="image/*" multiple>
  </div>
  
  <button type="submit">Procesar Imágenes</button>
</form>

<script>
document.getElementById('imageForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const formData = new FormData(e.target);
  
  try {
    const response = await fetch('/process-and-store', {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    
    if (result.success) {
      console.log('Imágenes procesadas:', result);
      
      // Descargar imagen principal
      window.open(result.downloadUrls.mainImage);
      
      // Descargar imágenes opcionales
      result.downloadUrls.optionalImages.forEach(url => {
        setTimeout(() => window.open(url), 1000);
      });
    }
  } catch (error) {
    console.error('Error:', error);
  }
});
</script>
