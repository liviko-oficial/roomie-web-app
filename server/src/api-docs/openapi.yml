  # Públicos adicionales
  /api/propiedades-renta/{propertyId}/similares:
    get:
      tags: [ Propiedades Renta (Público) ]
      summary: Obtener propiedades similares en el mismo campus
      operationId: getSimilarProperties
      description: Obtiene una lista de propiedades similares a la especificada en el mismo campus. Criterios de similitud incluyen rango de precio (±20%), tipo de propiedad, y características similares (baños, recámaras).
      security: [ ]
      parameters:
        - $ref: '#/components/parameters/propertyIdParam'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 6
          description: Número máximo de resultados (default 6, máximo 20)
      responses:
        '200':
          description: Lista de propiedades similares
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PropiedadRenta' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
              examples:
                similares_response:
                  value:
                    success: true
                    data:
                      - id: "64a7b8c9d1e2f3a4b5c6d7ea"
                        tipoPropiedad: "Departamento"
                        campus: "Guadalajara"
                        precioMensual: 8200
                        estado: "Activa"
                      - id: "64a7b8c9d1e2f3a4b5c6d7eb"
                        tipoPropiedad: "Departamento"
                        campus: "Guadalajara"
                        precioMensual: 8800
                        estado: "Activa"
                    pagination:
                      total: 2
                      page: 1
                      limit: 6
                      pages: 1
        '404': { $ref: '#/components/responses/NotFound' }
