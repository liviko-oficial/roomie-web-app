    patch:
      tags: [ Propiedades Renta (CRUD) ]
      summary: Restaurar una propiedad eliminada lógicamente
      operationId: restoreProperty
      description: Restaura una propiedad que fue eliminada lógicamente (soft delete).
      security:
        - bearerAuth: [ ]
      parameters:
